name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Verify Release Version Matches Project Version
        run: |
          PROJECT_VERSION=$(cat version.txt)
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$PROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: Release tag ($GITHUB_REF_NAME) does not match project version in version.txt ($PROJECT_VERSION)"
            exit 1
          fi

      - name: Publish Plugin
        run: ./gradlew :plugin:publishPlugins
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}

      - name: Bump Version
        run: |
          CURRENT_VERSION=$(cat version.txt | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)
          if [ -z "$CURRENT_VERSION" ]; then
            echo "Could not find current version in version.txt"
            exit 1
          fi
          
          IFS='.' read -r -a VERSION_PARTS <<< "$CURRENT_VERSION"
          PATCH_VERSION=$((VERSION_PARTS[2] + 1))
          NEW_VERSION="${VERSION_PARTS[0]}.${VERSION_PARTS[1]}.${PATCH_VERSION}"
          
          echo "$NEW_VERSION" > version.txt
          
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add version.txt
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push origin HEAD:main
